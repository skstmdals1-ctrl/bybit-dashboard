<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bybit AI Trader — Live Dashboard</title>
  <meta name="description" content="AI 기반 자동매매 봇의 실시간 운용 현황을 확인하세요." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #080b12;
      --surface:  #0f1623;
      --surface2: #161e2e;
      --border:   rgba(99,130,255,0.18);
      --accent:   #6382ff;
      --green:    #00e5a0;
      --red:      #ff4f6d;
      --yellow:   #f5c842;
      --text:     #e4eaf8;
      --muted:    #6b7a9a;
      --radius:   14px;
    }

    html { font-size: 15px; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 40px;
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, #0d1525 0%, #111827 100%);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
    }
    .logo {
      font-size: 1rem;
      font-weight: 900;
      letter-spacing: -0.5px;
      background: linear-gradient(90deg, #6382ff, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .status-badge {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 5px 12px;
      border-radius: 20px;
    }
    .badge-running { background: rgba(0,229,160,0.12); color: var(--green); border: 1px solid rgba(0,229,160,0.3); }
    .badge-stopped { background: rgba(255,79,109,0.12); color: var(--red);   border: 1px solid rgba(255,79,109,0.3); }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    .dot-green { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .dot-red   { background: var(--red); }
    @keyframes pulse {
      0%,100% { transform: scale(1); opacity: 1; }
      50%      { transform: scale(1.4); opacity: 0.6; }
    }

    /* ── Main ── */
    .main { max-width: 480px; margin: 0 auto; padding: 16px 14px 0; }

    /* ── KPI cards ── */
    .kpi-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }
    .kpi {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      transition: transform .2s;
    }
    .kpi:active { transform: scale(.97); }
    .kpi.full { grid-column: span 2; }
    .kpi-label {
      font-size: 0.68rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .8px;
      margin-bottom: 6px;
    }
    .kpi-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.45rem;
      font-weight: 700;
      line-height: 1;
    }
    .kpi-sub {
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 4px;
    }
    .pos { color: var(--green); }
    .neg { color: var(--red); }
    .neutral { color: var(--text); }

    /* ── Section title ── */
    .section-title {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin: 18px 0 10px;
    }

    /* ── Chart ── */
    .chart-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 14px;
    }
    .chart-wrap canvas { display: block; }

    /* ── Positions ── */
    .pos-list { display: flex; flex-direction: column; gap: 10px; }
    .pos-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px 10px;
    }
    .pos-card.long-card  { border-left: 3px solid var(--green); }
    .pos-card.short-card { border-left: 3px solid var(--red); }
    .pos-symbol {
      font-weight: 900;
      font-size: 0.95rem;
      grid-column: span 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .side-tag {
      font-size: 0.65rem;
      font-weight: 800;
      padding: 2px 8px;
      border-radius: 10px;
      letter-spacing: .5px;
    }
    .tag-long  { background: rgba(0,229,160,.15); color: var(--green); }
    .tag-short { background: rgba(255,79,109,.15); color: var(--red); }
    .pos-row { display: flex; flex-direction: column; }
    .pos-row-label { font-size: 0.62rem; color: var(--muted); margin-bottom: 1px; }
    .pos-row-val {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.82rem;
      font-weight: 600;
    }

    /* ── Signals ── */
    .signal-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(88px, 1fr));
      gap: 8px;
      margin-bottom: 14px;
    }
    .signal-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 8px;
      text-align: center;
    }
    .signal-sym  { font-size: 0.62rem; font-weight: 700; color: var(--muted); margin-bottom: 4px; }
    .signal-dir  { font-size: 0.85rem; font-weight: 900; }
    .signal-conf { font-size: 0.65rem; color: var(--muted); margin-top: 2px; }

    /* ── Footer ── */
    .footer {
      text-align: center;
      color: var(--muted);
      font-size: 0.68rem;
      padding: 24px 20px 0;
    }
    .footer span { display: block; margin-top: 2px; }

    /* ── Skeleton ── */
    .skeleton {
      background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 8px;
    }
    @keyframes shimmer { from { background-position: 200% 0; } to { background-position: -200% 0; } }

    /* ── No-position ── */
    .empty { color: var(--muted); font-size: 0.82rem; padding: 20px; text-align: center; }

    /* ── Refresh bar ── */
    .refresh-bar {
      height: 2px;
      background: var(--border);
      border-radius: 2px;
      margin: 10px 0 6px;
      overflow: hidden;
    }
    .refresh-progress {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #a78bfa);
      border-radius: 2px;
      transition: width .5s linear;
    }
  </style>
</head>
<body>

<!-- ── Header ── -->
<header class="header">
  <div class="logo">🤖 Bybit AI Trader</div>
  <div class="status-badge badge-stopped" id="statusBadge">
    <span class="dot dot-red" id="statusDot"></span>
    <span id="statusText">Loading...</span>
  </div>
</header>

<div class="main">

  <!-- KPI 카드 -->
  <div class="kpi-grid" id="kpiGrid">
    <div class="kpi full"><div class="kpi-label">Total Equity</div><div class="kpi-value skeleton" style="height:1.5rem;width:60%;border-radius:6px;">&nbsp;</div></div>
  </div>

  <!-- 자산 그래프 -->
  <div class="section-title">📈 누적 수익 추이</div>
  <div class="chart-wrap"><canvas id="equityChart" height="120"></canvas></div>

  <!-- 포지션 -->
  <div class="section-title">📊 현재 포지션</div>
  <div class="pos-list" id="posList"><div class="empty">로딩 중...</div></div>

  <!-- AI 신호 -->
  <div class="section-title">🧠 AI 실시간 신호</div>
  <div class="signal-grid" id="signalGrid"><div class="empty">로딩 중...</div></div>

  <!-- 리프레시 바 -->
  <div class="refresh-bar"><div class="refresh-progress" id="refreshBar" style="width:0%"></div></div>

</div>

<footer class="footer">
  <div>Last updated: <span id="lastUpdated">—</span></div>
  <span>Read-only view · Auto-refreshes every 60s</span>
</footer>

<script>
// ═══════════════════════════════════════════════════════
//  설정: data.json URL
//  GitHub Pages를 사용하는 경우 아래 URL을 수정하세요.
// ═══════════════════════════════════════════════════════
const DATA_URL = './data.json';
const REFRESH_SEC = 60;

// ── Chart 초기화 ──────────────────────────────────────
let equityChart = null;
const chartCtx = document.getElementById('equityChart').getContext('2d');

function initChart(labels, values) {
  if (equityChart) equityChart.destroy();
  const grad = chartCtx.createLinearGradient(0, 0, 0, 120);
  grad.addColorStop(0, 'rgba(99,130,255,0.35)');
  grad.addColorStop(1, 'rgba(99,130,255,0)');
  equityChart = new Chart(chartCtx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data: values,
        borderColor: '#6382ff',
        backgroundColor: grad,
        borderWidth: 2,
        pointRadius: values.length < 10 ? 4 : 0,
        pointHoverRadius: 5,
        fill: true,
        tension: 0.4,
      }]
    },
    options: {
      animation: false,
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: {
        callbacks: { label: ctx => ` $${ctx.parsed.y.toLocaleString()}` }
      }},
      scales: {
        x: { ticks: { color: '#6b7a9a', font: { size: 10 }, maxTicksLimit: 6 }, grid: { display: false } },
        y: { ticks: { color: '#6b7a9a', font: { size: 10 }, callback: v => '$' + (v/1000).toFixed(0) + 'k' }, grid: { color: 'rgba(99,130,255,0.07)' }, border: { display: false } }
      }
    }
  });
}

// ── 데이터 렌더링 ─────────────────────────────────────
function fmt(v, prefix='$') {
  const n = parseFloat(v);
  return prefix + Math.abs(n).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function signClass(v) { return parseFloat(v) >= 0 ? 'pos' : 'neg'; }
function signPrefix(v) { return parseFloat(v) >= 0 ? '+' : '-'; }

function renderKPI(d) {
  const grid = document.getElementById('kpiGrid');
  grid.innerHTML = `
    <div class="kpi full">
      <div class="kpi-label">Total Equity</div>
      <div class="kpi-value neutral">$${parseFloat(d.equity).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}</div>
      <div class="kpi-sub">미실현 <span class="${signClass(d.unrealized)}">${signPrefix(d.unrealized)}${fmt(d.unrealized)}</span></div>
    </div>
    <div class="kpi">
      <div class="kpi-label">오늘 실현 PnL</div>
      <div class="kpi-value ${signClass(d.daily_pnl)}">${signPrefix(d.daily_pnl)}${fmt(d.daily_pnl)}</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">누적 실현 PnL</div>
      <div class="kpi-value ${signClass(d.total_pnl)}">${signPrefix(d.total_pnl)}${fmt(d.total_pnl)}</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">포지션 수</div>
      <div class="kpi-value neutral">${d.positions.length}</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">가용 잔고</div>
      <div class="kpi-value neutral">$${parseFloat(d.available).toLocaleString(undefined,{minimumFractionDigits:0,maximumFractionDigits:0})}</div>
    </div>
  `;
}

function renderPositions(positions) {
  const el = document.getElementById('posList');
  if (!positions.length) { el.innerHTML = '<div class="empty">현재 열린 포지션이 없습니다</div>'; return; }
  el.innerHTML = positions.map(p => {
    const isLong = p.side === 'LONG';
    const pnlClass = signClass(p.pnl);
    return `
    <div class="pos-card ${isLong ? 'long-card' : 'short-card'}">
      <div class="pos-symbol">
        <span>${p.symbol}</span>
        <span class="side-tag ${isLong ? 'tag-long' : 'tag-short'}">${p.side}</span>
      </div>
      <div class="pos-row"><div class="pos-row-label">미실현 PnL</div>
        <div class="pos-row-val ${pnlClass}">${signPrefix(p.pnl)}$${Math.abs(p.pnl).toFixed(2)} (${signPrefix(p.pnl_pct)}${Math.abs(p.pnl_pct).toFixed(2)}%)</div></div>
      <div class="pos-row"><div class="pos-row-label">투입 마진</div>
        <div class="pos-row-val">$${p.margin.toFixed(0)}</div></div>
      <div class="pos-row"><div class="pos-row-label">레버리지</div>
        <div class="pos-row-val">${p.leverage}x</div></div>
      <div class="pos-row"><div class="pos-row-label">분할 티어</div>
        <div class="pos-row-val">${p.tier}</div></div>
    </div>`;
  }).join('');
}

function renderSignals(signals) {
  const el = document.getElementById('signalGrid');
  const entries = Object.entries(signals);
  if (!entries.length) { el.innerHTML = '<div class="empty">신호 없음</div>'; return; }
  el.innerHTML = entries.map(([sym, s]) => {
    const dirColor = s.dir === 'long' ? 'var(--green)' : s.dir === 'short' ? 'var(--red)' : 'var(--muted)';
    return `<div class="signal-card">
      <div class="signal-sym">${sym.replace('USDT','')}</div>
      <div class="signal-dir" style="color:${dirColor}">${s.dir.toUpperCase()}</div>
      <div class="signal-conf">${(s.conf*100).toFixed(0)}%</div>
    </div>`;
  }).join('');
}

function renderStatus(status) {
  const badge = document.getElementById('statusBadge');
  const dot   = document.getElementById('statusDot');
  const text  = document.getElementById('statusText');
  const running = status === 'running';
  badge.className = 'status-badge ' + (running ? 'badge-running' : 'badge-stopped');
  dot.className   = 'dot ' + (running ? 'dot-green' : 'dot-red');
  text.textContent = running ? 'LIVE' : 'OFFLINE';
}

function renderChart(hist) {
  if (!hist || !hist.length) return;
  const labels = hist.map(h => h.t.slice(5));
  const values = hist.map(h => h.v);
  initChart(labels, values);
}

function renderLastUpdated(ts) {
  try {
    const d = new Date(ts);
    document.getElementById('lastUpdated').textContent =
      d.toLocaleString('ko-KR', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', second:'2-digit' });
  } catch(e) {}
}

// ── 데이터 fetch ──────────────────────────────────────
async function fetchData() {
  try {
    const r = await fetch(DATA_URL + '?t=' + Date.now());
    if (!r.ok) throw new Error(r.status);
    const d = await r.json();
    renderStatus(d.status);
    renderKPI(d);
    renderPositions(d.positions || []);
    renderSignals(d.signals || {});
    renderChart(d.equity_hist || []);
    renderLastUpdated(d.ts);
  } catch(e) {
    console.warn('fetch error', e);
    document.getElementById('statusText').textContent = 'ERR';
  }
}

// ── 리프레시 바 ───────────────────────────────────────
let elapsed = 0;
function tickProgress() {
  elapsed++;
  const pct = (elapsed / REFRESH_SEC) * 100;
  document.getElementById('refreshBar').style.width = pct + '%';
  if (elapsed >= REFRESH_SEC) {
    elapsed = 0;
    fetchData();
  }
}

// ── 초기 실행 ─────────────────────────────────────────
fetchData();
setInterval(tickProgress, 1000);
</script>
</body>
</html>
